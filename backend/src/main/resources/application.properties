# resource/application.properties

# Load local .env when running either from repository root or backend/
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Server Configuration
server.address=0.0.0.0
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# PostgreSQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Optimization
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'Asia/Ho_Chi_Minh'

# JPA / Hibernate Configuration
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# Hibernate Batch Insert/Update Optimization
# Groups INSERTs/UPDATEs in batches of 20, reducing DB round-trips for large orders
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Database Migration
# baseline-on-migrate: Mark current DB as version 1 (skip V1__Initial_Schema.sql)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Hibernate Logging
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=INFO

# Jackson JSON Configuration
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.default-property-inclusion=non_null

# Error Handling Configuration
server.error.include-message=never
server.error.include-binding-errors=never
spring.mvc.problemdetails.enabled=false

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Redis Caching Configuration
spring.cache.type=redis
spring.cache.redis.cache-null-values=false
spring.cache.redis.time-to-live=1h
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false

# JWT Security
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}
security.jwt.refresh-cookie-name=${JWT_REFRESH_COOKIE_NAME}
security.jwt.refresh-cookie-secure=${JWT_REFRESH_COOKIE_SECURE}

# Email (SMTP) Configuration
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Base URL Configuration
app.base-url=${APP_BASE_URL}
app.frontend.base-url=${APP_FRONTEND_BASE_URL}

# PayOS Configuration
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

# Actuator / Prometheus Metrics — expose only the prometheus endpoint
management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# CORS Configuration — comma-separated list of allowed origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://order-by-qr.vercel.app}

# Gemini AI Configuration
gemini.enabled=${GEMINI_ENABLED:true}
gemini.api-key=${GEMINI_API_KEY}
gemini.api-url=${GEMINI_API_URL}
gemini.connect-timeout-seconds=${GEMINI_CONNECT_TIMEOUT_SECONDS:5}
gemini.read-timeout-seconds=${GEMINI_READ_TIMEOUT_SECONDS:15}
gemini.temperature=${GEMINI_TEMPERATURE:0.7}
gemini.top-p=${GEMINI_TOP_P:0.9}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:500}
