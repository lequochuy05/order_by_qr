app:
  security:
    enable-default-admin: false
    trust-proxy-headers: ${APP_TRUST_PROXY_HEADERS:false}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

spring:
  main:
    lazy-initialization: true

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

  data:
    jpa:
      repositories:
        bootstrap-mode: deferred

    redis:
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

auth:
  password-reset:
    phone-enabled: false
    dev-log-otp: false

security:
  jwt:
    refresh-cookie-secure: true

gemini:
  enabled: ${GEMINI_ENABLED:true}

logging:
  level:
    com.qros: INFO
    org.hibernate.SQL: WARN
