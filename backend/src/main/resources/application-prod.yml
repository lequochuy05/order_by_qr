app:
  security:
    enable-default-admin: false
    trust-proxy-headers: ${APP_TRUST_PROXY_HEADERS:false}
    bcrypt-strength: 12
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
  cache:
    prefix: ${APP_CACHE_PREFIX:qros:v3:}
  email:
    from-name: ${APP_EMAIL_FROM_NAME:QROS}
    brand-name: ${APP_EMAIL_BRAND_NAME:QROS}
    copyright: ${APP_EMAIL_COPYRIGHT:2026 QROS}

spring:
  jpa:
    show-sql: false

  data:
    redis:
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

auth:
  password-reset:
    phone-enabled: false
    dev-log-otp: false

security:
  jwt:
    refresh-cookie-secure: true
    refresh-cookie-same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

gemini:
  enabled: ${GEMINI_ENABLED:true}

logging:
  level:
    com.qros: INFO
    org.hibernate.SQL: WARN
