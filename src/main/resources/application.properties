# resource/application.properties

# Cấu hình Máy chủ (Server)
server.address=0.0.0.0
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
server.compression.min-response-size=1024

# Cấu hình PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Tối ưu hóa HikariCP Connection Pool (Khắc phục lỗi SSL Read timed out / Connection timeout)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000

# Cấu hình JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway Database Migration
# baseline-on-migrate: Đánh dấu DB hiện tại là version 1 (bỏ qua V1__Initial_Schema.sql)
# baseline-version: Version mà Flyway coi là đã chạy xong, bắt đầu từ V1.1 trở đi
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Tắt debug Hibernate trên production để tránh nghẽn I/O
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO

# Cấu hình Jackson JSON
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.default-property-inclusion=non_null

# Cấu hình Redis Caching
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false
spring.cache.redis.time-to-live=1h

# JWT Security
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=86400000   

# Cấu hình xử lý lỗi (Error Handling)
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.problemdetails.enabled=true

# Cấu hình Upload File
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cấu hình Email (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cấu hình Cloudinary
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# Cấu hình URL cơ bản của ứng dụng
app.base-url=${APP_BASE_URL}
app.frontend.base-url=${APP_FRONTEND_BASE_URL}
 
# Cấu hình PayOS
payos.client-id=${PAYOS_CLIENT_ID}
payos.api-key=${PAYOS_API_KEY}
payos.checksum-key=${PAYOS_CHECKSUM_KEY}

# Cấu hình Gemini AI
gemini.api-key=${GEMINI_API_KEY}
gemini.api-url=${GEMINI_API_URL}
