<!-- resources/static/login.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng Nhập</title>
  <link rel="stylesheet" href="css/login.css" />
  <style>
    /* Modal Styles */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal__dialog {
      position: relative;
      background: white;
      border-radius: 12px;
      padding: 0;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal__header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal__title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .modal__close {
      background: transparent;
      border: none;
      font-size: 28px;
      line-height: 1;
      color: #6b7280;
      cursor: pointer;
      padding: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .modal__close:hover {
      background: #f3f4f6;
      color: #111827;
    }

    .modal__body {
      padding: 20px 24px;
      color: #374151;
      line-height: 1.6;
    }

    .modal__footer {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn--primary {
      background: #3b82f6;
      color: white;
    }

    .btn--primary:hover {
      background: #2563eb;
    }

    /* Modal Types */
    .modal--error .modal__title {
      color: #dc2626;
    }

    .modal--error .btn--primary {
      background: #dc2626;
    }

    .modal--error .btn--primary:hover {
      background: #b91c1c;
    }

    .modal--success .modal__title {
      color: #16a34a;
    }

    .modal--success .btn--primary {
      background: #16a34a;
    }

    .modal--success .btn--primary:hover {
      background: #15803d;
    }

    .modal--info .modal__title {
      color: #0284c7;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2 class="login-title">Đăng Nhập</h2>
    <form class="login-form" novalidate>
      <div class="input-group">
        <input type="email" placeholder="Email" id="email" required />
      </div>
      <div class="input-group">
        <input type="password" placeholder="Mật khẩu" id="password" required />
      </div>
      <div class="forgot-link">
        <a href="/forget-password.html">Quên mật khẩu?</a>
      </div>
      <button type="submit" class="login-btn">Đăng nhập</button>

      <div class="social-login">
        <p>Hoặc đăng nhập bằng</p>
        <div class="social-icons">
          <img src="images/google.png" alt="Google" />
          <img src="images/facebook.png" alt="Facebook" />
          <img src="images/twitter.png" alt="Twitter" />
        </div>
      </div>

      <div class="register-link">
        <p>Nếu bạn chưa có tài khoản? <i><a href="#">Đăng ký ngay</a></i></p>
      </div>
    </form>
  </div>

  <!-- Modal -->
  <div id="app-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="app-modal-title" aria-hidden="true">
    <div class="modal__backdrop"></div>
    <div class="modal__dialog">
      <div class="modal__header">
        <h3 id="app-modal-title" class="modal__title">Thông báo</h3>
        <button type="button" class="modal__close" aria-label="Đóng">&times;</button>
      </div>
      <div id="app-modal-body" class="modal__body"></div>
      <div class="modal__footer">
        <button type="button" class="btn btn--primary" id="app-modal-ok">OK</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
