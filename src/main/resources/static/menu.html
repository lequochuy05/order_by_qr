<!-- resources/static/menu.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/menuItem.css">
  <title>Đặt Món</title>
</head>
<body>
  <div class="container">
    <div class="table-title">Bàn: <span id="tableNumber">00</span></div>

    <div class="menu-toolbar">
      <label class="control cell cat">
        <span class="icon">🍽️</span>
        <select id="categoryFilter" onchange="loadMenu(this.value)">
          <option value="all">Tất cả</option>
        </select>
      </label>

      <label class="control cell sort">
        <span class="icon">↕</span>
        <select id="sortBy" onchange="reloadWithSort()">
          <option value="default">Mặc định</option>
          <option value="price-asc">Giá ↑</option>
          <option value="price-desc">Giá ↓</option>
        </select>
      </label>

      <label class="control cell search">
        <span class="icon">🔎</span>
        <input id="quickSearch" type="search" placeholder="Tìm món..." oninput="filterByName(this.value)">
      </label>
    </div>

    <div id="comboSection">
      <h3 class="section-header"> Combo Ưu Đãi</h3>
      <div id="comboItems"></div>
    </div>

    <div>
      <h3 class="section-header">Thực Đơn</h3>
      <div id="menuItems"></div>
    </div>
  </div>

  <!-- Cart Float Button -->
  <div class="cart-float">
    <button class="cart-button" onclick="toggleCart()">
      🛒
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>

  <!-- Cart Panel -->
  <div class="cart-backdrop" id="cartBackdrop" onclick="closeCart()"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h3>🛒 Giỏ hàng</h3>
      <button class="cart-close" onclick="closeCart()">×</button>
    </div>
    
    <div class="cart-items" id="cartItemsList">
      <div class="cart-empty">
        <div class="cart-empty-icon">🛒</div>
        <div>Giỏ hàng trống</div>
        <div style="font-size: 13px; margin-top: 8px;">Nhấn vào món để thêm</div>
      </div>
    </div>
    
    <div class="cart-footer">
      <div class="cart-total">
        <span class="cart-total-label">Tổng cộng:</span>
        <span class="cart-total-value" id="cartTotalValue">0đ</span>
      </div>
      <button class="cart-checkout" onclick="checkoutFromCart()">
        Đặt món ngay
      </button>
    </div>
  </div>

  <!-- Order Confirmation Modal -->
  <div id="confirmModal" class="order-modal">
    <div class="modal-backdrop" onclick="closeConfirm()"></div>
    <div class="modal-body">
      <h3>✓ Xác nhận đặt món</h3>
      <div id="confirmList" class="confirm-list"></div>
      <div class="confirm-total">
        <div><span>Tiền món:</span><b id="subtotalItems">0đ</b></div>
        <div><span>Tiền combo:</span><b id="subtotalCombos">0đ</b></div>
        <div><span>Tổng cộng:</span><b id="confirmTotal">0đ</b></div>
      </div>
      <div class="confirm-actions">
        <button class="btn ghost" onclick="closeConfirm()">Sửa lại</button>
        <button class="btn" id="confirmBtn" onclick="confirmOrder()">Xác nhận</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <script src="js/config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/menu.js"></script>
  
  
</body>
</html>
